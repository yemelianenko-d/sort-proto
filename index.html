<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Сортуй! — прототип</title>

    <!-- PWA / app-like -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#fdfcf6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Сортуй!" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <!-- Handwritten fonts are self-hosted and bundled (see src/app/bootstrap.ts) -->

    <style>
      /* No page scroll / zoom / pull-to-refresh; the game owns the whole viewport. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        background: #fdfcf6;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
      }
      /* Probe element: lets JS read iOS safe-area insets in px. */
      #safe-area-probe {
        position: fixed;
        pointer-events: none;
        visibility: hidden;
        top: env(safe-area-inset-top, 0px);
        left: env(safe-area-inset-left, 0px);
        right: env(safe-area-inset-right, 0px);
        bottom: env(safe-area-inset-bottom, 0px);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="safe-area-probe"></div>
    <script type="module" src="/src/app/bootstrap.ts"></script>
  </body>
</html>
